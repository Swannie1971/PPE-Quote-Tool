<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1440"/>
  <title>Power Panels &amp; Electrical &middot; Quote Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
/* Power Panels & Electrical — Quote Tool */

:root,
[data-theme="dark"] {
  --bg: #0B1220;
  --bg-elev: #0F1828;
  --surface: #131E33;
  --surface-2: #1A2540;
  --surface-hover: #1E2B4A;
  --border: #1F2A44;
  --border-strong: #2A3957;
  --text: #F1F5F9;
  --text-muted: #94A3B8;
  --text-dim: #64748B;
  --primary: #3B82F6;
  --primary-hover: #2563EB;
  --primary-soft: rgba(59,130,246,0.14);
  --success: #22C55E;
  --success-soft: rgba(34,197,94,0.14);
  --warning: #F59E0B;
  --warning-soft: rgba(245,158,11,0.16);
  --danger: #EF4444;
  --danger-soft: rgba(239,68,68,0.14);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
}

[data-theme="light"] {
  --bg: #F4F6FA;
  --bg-elev: #FFFFFF;
  --surface: #FFFFFF;
  --surface-2: #F8FAFC;
  --surface-hover: #F1F5F9;
  --border: #E2E8F0;
  --border-strong: #CBD5E1;
  --text: #0F172A;
  --text-muted: #475569;
  --text-dim: #94A3B8;
  --primary: #2563EB;
  --primary-hover: #1D4ED8;
  --primary-soft: rgba(37,99,235,0.10);
  --success: #16A34A;
  --success-soft: rgba(22,163,74,0.10);
  --warning: #D97706;
  --warning-soft: rgba(217,119,6,0.12);
  --danger: #DC2626;
  --danger-soft: rgba(220,38,38,0.10);
  --shadow-sm: 0 1px 2px rgba(15,23,42,0.06);
  --shadow-md: 0 4px 16px rgba(15,23,42,0.08);
  --shadow-lg: 0 20px 60px rgba(15,23,42,0.18);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13.5px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.mono, .num {
  font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
}

#root { min-height: 100vh; }

/* ---------- Layout ---------- */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 100vh;
  background: var(--bg);
}

.sidebar {
  background: var(--bg-elev);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 18px 18px;
  border-bottom: 1px solid var(--border);
  height: 56px;
}
.brand-mark {
  width: 28px;
  height: 28px;
  background: var(--primary);
  border-radius: 4px;
  display: grid;
  place-items: center;
  color: white;
  font-weight: 700;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  letter-spacing: -0.02em;
  position: relative;
  overflow: hidden;
}
.brand-mark::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(90deg, transparent 0 3px, rgba(255,255,255,0.18) 3px 4px);
  pointer-events: none;
}
.brand-name {
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.01em;
  line-height: 1.15;
}
.brand-sub {
  font-size: 10.5px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-family: 'IBM Plex Mono', monospace;
}

.nav-section {
  padding: 14px 12px 6px;
}
.nav-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 4px 8px 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 8px;
  border-radius: 4px;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  border: 1px solid transparent;
  user-select: none;
}
.nav-item:hover { background: var(--surface-hover); color: var(--text); }
.nav-item.active {
  background: var(--surface);
  color: var(--text);
  border-color: var(--border);
}
.nav-item.active .nav-icon { color: var(--primary); }
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--text-dim); }
.nav-item.active .nav-icon, .nav-item:hover .nav-icon { color: currentColor; }
.nav-badge {
  margin-left: auto;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
}

.user-block {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar {
  width: 28px; height: 28px;
  border-radius: 4px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  display: grid; place-items: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
}
.user-info { font-size: 12px; line-height: 1.2; }
.user-name { color: var(--text); }
.user-role { color: var(--text-dim); font-size: 10.5px; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; }

/* ---------- Main area ---------- */
.main {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.topbar {
  height: 56px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 30;
}
.crumbs {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
}
.crumb-sep { color: var(--text-dim); }
.crumb-current { color: var(--text); }

.topbar-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

.kbd {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  padding: 2px 5px;
  border: 1px solid var(--border-strong);
  border-radius: 3px;
  color: var(--text-muted);
  background: var(--surface);
}

.theme-toggle {
  display: inline-flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 2px;
  gap: 2px;
}
.theme-toggle button {
  background: transparent;
  border: 0;
  color: var(--text-muted);
  width: 28px;
  height: 24px;
  display: grid;
  place-items: center;
  cursor: pointer;
  border-radius: 3px;
  transition: background 0.15s, color 0.15s;
}
.theme-toggle button:hover { color: var(--text); }
.theme-toggle button.active {
  background: var(--bg-elev);
  color: var(--primary);
  box-shadow: 0 0 0 1px var(--border-strong);
}

.content {
  padding: 24px;
  flex: 1;
  min-width: 0;
}

.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 16px;
}
.page-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.015em;
  margin: 0;
}
.page-sub {
  color: var(--text-muted);
  font-size: 13px;
  margin-top: 4px;
  font-family: 'IBM Plex Mono', monospace;
}

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border-radius: 4px;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  text-decoration: none;
  white-space: nowrap;
}
.btn:hover { background: var(--surface-hover); border-color: var(--border-strong); }
.btn-primary {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}
.btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text-muted); }
.btn-ghost:hover { background: var(--surface-hover); color: var(--text); }
.btn-sm { padding: 4px 8px; font-size: 11.5px; }
.btn-icon { padding: 6px; }
.btn-danger { color: var(--danger); }
.btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); }

/* ---------- Cards / panels ---------- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
}
.card-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
}
.card-body { padding: 16px; }

/* ---------- KPI ---------- */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 16px;
}
.kpi-label {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
}
.kpi-value {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin-top: 4px;
}
.kpi-delta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  margin-top: 4px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}
.delta-up { color: var(--success); }
.delta-down { color: var(--danger); }

/* ---------- Tables ---------- */
.table-wrap {
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  overflow: hidden;
}
table.data {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
table.data thead th {
  text-align: left;
  font-weight: 600;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
  white-space: nowrap;
}
table.data tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
table.data tbody tr:last-child td { border-bottom: 0; }
table.data tbody tr:hover { background: var(--surface-hover); cursor: pointer; }
table.data tbody tr.selected { background: var(--primary-soft); }
.t-right { text-align: right; }
.t-num { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }

/* ---------- Inputs ---------- */
.field {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.label {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--text-muted);
}
.input, .select, textarea.input {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 10px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 13px;
  outline: none;
  width: 100%;
}
.input:focus, .select:focus, textarea.input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-soft);
}
.input.num, .input.mono { font-family: 'IBM Plex Mono', monospace; }
.input-group { display: flex; align-items: stretch; }
.input-group .input { border-radius: 4px 0 0 4px; }
.input-suffix {
  border: 1px solid var(--border);
  border-left: 0;
  background: var(--surface-2);
  padding: 7px 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
  border-radius: 0 4px 4px 0;
}

/* ---------- Badge / chips ---------- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 7px;
  border-radius: 3px;
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-family: 'IBM Plex Mono', monospace;
  border: 1px solid var(--border-strong);
  color: var(--text-muted);
  background: var(--surface-2);
}
.badge-success { color: var(--success); border-color: rgba(34,197,94,0.4); background: var(--success-soft); }
.badge-warning { color: var(--warning); border-color: rgba(245,158,11,0.4); background: var(--warning-soft); }
.badge-danger { color: var(--danger); border-color: rgba(239,68,68,0.4); background: var(--danger-soft); }
.badge-primary { color: var(--primary); border-color: rgba(59,130,246,0.4); background: var(--primary-soft); }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.cat-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10.5px;
  font-family: 'IBM Plex Mono', monospace;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  white-space: nowrap;
}

/* ---------- Tabs ---------- */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
  padding: 0 24px;
}
.tab {
  padding: 12px 16px;
  font-size: 12.5px;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--primary); }
.tab-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  color: var(--text-dim);
}
.tab.active .tab-num { color: var(--primary); }

/* ---------- Login ---------- */
.login-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--bg);
}
.login-art {
  background:
    linear-gradient(180deg, rgba(11,18,32,0.6), rgba(11,18,32,0.95)),
    radial-gradient(1200px 600px at 30% 20%, rgba(59,130,246,0.18), transparent),
    var(--bg-elev);
  border-right: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 40px;
}
.login-art::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(148,163,184,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,0.06) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.login-art-content { position: relative; margin-top: auto; }
.login-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.18em;
  margin-bottom: 14px;
}
.login-h {
  font-size: 36px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.1;
  max-width: 480px;
  text-wrap: balance;
}
.login-sub {
  color: var(--text-muted);
  margin-top: 14px;
  max-width: 440px;
  font-size: 14px;
}
.login-meta {
  margin-top: 40px;
  display: flex;
  gap: 28px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
}
.login-meta b { color: var(--text); font-weight: 500; }
.login-form-wrap {
  display: grid;
  place-items: center;
  padding: 40px;
}
.login-form {
  width: 100%;
  max-width: 360px;
}
.login-form .brand { padding: 0; border: 0; margin-bottom: 28px; }

/* ---------- Quote builder ---------- */
.qb-grid {
  display: grid;
  grid-template-columns: 380px 1fr 320px;
  height: calc(100vh - 56px - 49px); /* topbar + tabs */
  min-height: 0;
}
.qb-list {
  border-right: 1px solid var(--border);
  background: var(--bg-elev);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.qb-list-head {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg-elev);
  z-index: 2;
}
.search {
  position: relative;
}
.search .input { padding-left: 30px; }
.search-icon {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  width: 14px;
  height: 14px;
}
.qb-filters {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.filter-chip {
  font-size: 11px;
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text-muted);
  cursor: pointer;
  background: var(--surface);
  font-family: 'IBM Plex Mono', monospace;
}
.filter-chip.active {
  background: var(--primary-soft);
  color: var(--primary);
  border-color: rgba(59,130,246,0.5);
}

.line-row {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 4px 12px;
  align-items: start;
}
.line-row:hover { background: var(--surface-hover); }
.line-row.selected { background: var(--primary-soft); border-left: 2px solid var(--primary); padding-left: 12px; }
.line-row.selected .line-code { color: var(--primary); }
.line-code {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  color: var(--text-dim);
  letter-spacing: 0.04em;
}
.line-desc {
  font-size: 12.5px;
  color: var(--text);
  line-height: 1.3;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.line-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  color: var(--text-muted);
  margin-top: 3px;
  display: flex;
  gap: 8px;
}
.line-price {
  font-family: 'IBM Plex Mono', monospace;
  text-align: right;
  font-size: 12px;
  white-space: nowrap;
}
.line-qty { color: var(--text-dim); font-size: 10.5px; }
.line-total { color: var(--text); }

.qb-detail {
  overflow-y: auto;
  padding: 24px 28px;
  min-width: 0;
  background: var(--bg);
}

.qb-summary {
  border-left: 1px solid var(--border);
  background: var(--bg-elev);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sum-section {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
}
.sum-title {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.sum-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12.5px;
  padding: 4px 0;
}
.sum-row .sk { color: var(--text-muted); font-family: 'IBM Plex Sans', sans-serif; font-size: 12.5px; }
.sum-row.total { padding-top: 10px; margin-top: 6px; border-top: 1px dashed var(--border-strong); font-size: 14px; }
.sum-row.total .sk { color: var(--text); font-weight: 600; }

.margin-meter {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.

  // and pass noDeckControls to suppress this one.

    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),

  );

  // __omelette_rail_enabled window message, posted only when the

  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.

    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );

    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

const QuoteBuilder = ({ project, bom, setBom, labour, setLabour, copper, setCopper, onPDF, onBack, totals }) => {
  const [tab, setTab] = React.useState('bom');

  });

          <button className="btn btn-sm"><Icon name="download" size={12}/>Save</button>
          <button className="btn btn-sm btn-primary" onClick={onPDF}><Icon name="doc" size={12}/>Preview PDF</button>
        </div>
      </div>

      {tab === 'bom' && (
        <BomBuilder
          bom={bom} filtered={filtered} selected={selected}
          setSelectedId={setSelectedId} updateLine={updateLine} removeLine={removeLine}
          filter={filter} setFilter={setFilter} q={q} setQ={setQ}
          totals={totals}
        />
      )}
      {tab === 'customer' && <CustomerTab project={project}/>}
      {tab === 'labour' && <LabourTab labour={labour} setLabour={setLabour}/>}
      {tab === 'copper' && <CopperTab copper={copper} setCopper={setCopper}/>}
      {tab === 'summary' && <SummaryTab totals={totals} project={project} bom={bom} labour={labour}/>}
    </>
  );
};

/* ---------- BOM Builder (master / detail / summary) ---------- */
const BomBuilder = ({ bom, filtered, selected, setSelectedId, updateLine, removeLine, filter, setFilter, q, setQ, totals }) => {
  if (!selected) return <div className="empty">Add an item to get started.</div>;

  const cats = window.PPE.CATEGORIES;
  const lineCost = selected.qty * selected.cost;
  const sell = lineCost * (1 + selected.markup/100);
  const margin = sell > 0 ? ((sell - lineCost) / sell) * 100 : 0;

  return (
    <div className="qb-grid">
      {/* List */}
      <div className="qb-list">
        <div className="qb-list-head">
          <div className="search">
            <Icon name="search" size={13} className="search-icon"/>
            <input className="input" placeholder="Search code / description / supplier…" value={q} onChange={e=>setQ(e.target.value)}/>
          </div>
          <div className="qb-filters">
            {cats.map(c => (
              <span key={c.id} className={`filter-chip ${filter===c.id?'active':''}`} onClick={()=>setFilter(c.id)}>
                {c.label}
              </span>
            ))}
          </div>
        </div>
        <div className="qb-toolbar" style={{top:'unset', position:'sticky'}}>
          <button className="btn btn-sm btn-primary"><Icon name="plus" size={11}/>Add item</button>
          <button className="btn btn-sm"><Icon name="edit" size={11}/>Custom line</button>
          <span style={{marginLeft:'auto', fontFamily:'IBM Plex Mono', fontSize:10.5, color:'var(--text-dim)', alignSelf:'center'}}>
            {filtered.length} / {bom.length} ITEMS
          </span>
        </div>

        {filtered.map(line => {
          const total = line.qty * line.cost * (1 + line.markup/100);
          const isLow = line.markup < 22;
          return (
            <div key={line.id}
              className={`line-row ${selected.id===line.id?'selected':''}`}
              onClick={()=>setSelectedId(line.id)}>
              <div>
                <div className="line-code">{line.code}{isLow && <span className="warn-pill" style={{marginLeft:8, fontSize:9, padding:'1px 5px'}}>LOW MARGIN</span>}</div>
                <div className="line-desc">{line.desc}</div>
                <div className="line-meta">
                  <span className="cat-chip"><CategoryIcon cat={line.cat} size={10}/>{cats.find(c=>c.id===line.cat)?.label}</span>
                  <span>{line.supplier}</span>
                </div>
              </div>
              <div className="line-price">
                <div className="line-qty">{line.qty} {line.unit} × R {line.cost.toLocaleString('en-ZA')}</div>
                <div className="line-total">R {total.toLocaleString('en-ZA', {maximumFractionDigits:0})}</div>
                <div style={{color: isLow?'var(--warning)':'var(--success)', fontSize:10.5}}>{line.markup}% mu</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Detail */}
      <div className="qb-detail">
        <div className="detail-head">
          <div className="detail-icon"><CategoryIcon cat={selected.cat} size={20}/></div>
          <div style={{flex:1, minWidth:0}}>
            <h2 className="detail-title">{selected.desc}</h2>
            <div className="detail-sub">
              <span>{selected.code}</span>
              <span>· {selected.supplier}</span>
              <span>· {cats.find(c=>c.id===selected.cat)?.label}</span>
            </div>
          </div>
          <button className="btn btn-sm btn-ghost"><Icon name="copy" size={12}/>Duplicate</button>
          <button className="btn btn-sm btn-ghost btn-danger" onClick={()=>removeLine(selected.id)}><Icon name="trash" size={12}/>Remove</button>
        </div>

        <div className="card">
          <div className="card-head"><div className="card-title">Item Pricing</div></div>
          <div className="card-body">
            <div className="form-grid">
              <div className="field">
                <label className="label">Quantity</label>
                <div className="input-group">
                  <input className="input num" type="number" value={selected.qty}
                    onChange={e=>updateLine({qty: Number(e.target.value)})}/>
                  <span className="input-suffix">{selected.unit}</span>
                </div>
              </div>
              <div className="field">
                <label className="label">Unit Cost</label>
                <div className="input-group">
                  <input className="input num" type="number" value={selected.cost}
                    onChange={e=>updateLine({cost: Number(e.target.value)})}/>
                  <span className="input-suffix">ZAR</span>
                </div>
              </div>
              <div className="field">
                <label className="label">Markup %</label>
                <div className="input-group">
                  <input className="input num" type="number" value={selected.markup}
                    onChange={e=>updateLine({markup: Number(e.target.value)})}/>
                  <span className="input-suffix">%</span>
                </div>
              </div>
              <div className="field">
                <label className="label">Discount %</label>
                <div className="input-group">
                  <input className="input num" type="number" defaultValue={0}/>
                  <span className="input-suffix">%</span>
                </div>
              </div>
            </div>

            <div className="calc-card">
              <div className="calc-grid">
                <div className="calc-cell">
                  <div className="lab">Line Cost</div>
                  <div className="val">R {lineCost.toLocaleString('en-ZA', {maximumFractionDigits:0})}</div>
                </div>
                <div className="calc-cell">
                  <div className="lab">Markup Amount</div>
                  <div className="val">R {(sell - lineCost).toLocaleString('en-ZA', {maximumFractionDigits:0})}</div>
                </div>
                <div className="calc-cell accent">
                  <div className="lab">Sell Value</div>
                  <div className="val">R {sell.toLocaleString('en-ZA', {maximumFractionDigits:0})}</div>
                </div>
                <div className={`calc-cell ${margin < 22 ? 'warn' : 'accent'}`}>
                  <div className="lab">Margin (GP%)</div>
                  <div className="val">{margin.toFixed(1)}%</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div className="card" style={{marginTop:14}}>
          <div className="card-head"><div className="card-title">Item Details</div></div>
          <div className="card-body">
            <div className="form-grid cols-2">
              <div className="field">
                <label className="label">Item Code</label>
                <input className="input mono" value={selected.code} readOnly/>
              </div>
              <div className="field">
                <label className="label">Supplier</label>
                <input className="input" value={selected.supplier} readOnly/>
              </div>
              <div className="field col-span-2">
                <label className="label">Description</label>
                <input className="input" value={selected.desc} readOnly/>
              </div>
              <div className="field col-span-2">
                <label className="label">Line Notes (printed on quote)</label>
                <textarea className="input" rows={2} placeholder="e.g. confirm cable entry direction"
                  value={selected.notes} onChange={e=>updateLine({notes: e.target.value})}/>
              </div>
            </div>
          </div>
        </div>

        <div className="card" style={{marginTop:14}}>
          <div className="card-head" style={{justifyContent:'space-between'}}>
            <div className="card-title">Supplier Reference</div>
            <span className="mono" style={{fontSize:10.5, color:'var(--text-dim)'}}>UPDATED 2026-04-22</span>
          </div>
          <div className="card-body" style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:14}}>
            <div><div className="label">List Price</div><div className="num" style={{fontSize:13}}>R {(selected.cost*1.08).toLocaleString('en-ZA')}</div></div>
            <div><div className="label">Lead time</div><div className="num" style={{fontSize:13}}>5–7 wks</div></div>
            <div><div className="label">Stock status</div><div style={{fontSize:13}}><span className="badge badge-success"><span className="badge-dot"/>IN STOCK</span></div></div>
            <div><div className="label">Min. order</div><div className="num" style={{fontSize:13}}>1 ea</div></div>
          </div>
        </div>
      </div>

      {/* Summary sidebar */}
      <QuoteSummary totals={totals}/>
    </div>
  );
};

        <div key={s.label} style={{display:'flex', alignItems:'center', gap:8, fontSize:11.5, padding:'3px 0'}}>

/* ---------- Labour tab ---------- */
const LabourTab = ({ labour, setLabour }) => {

  const totalHours = labour.reduce((a,b)=>a+b.hours, 0);
  const totalCost = labour.reduce((a,b)=>a+b.hours*b.rate, 0);
  const totalSell = totalCost * 1.45;
  return (
    <div className="content">
      <div className="page-head">
        <div><h1 className="page-title">Labour Calculator</h1><div className="page-sub">AUTO-CALC FROM RULES · 7 CATEGORIES · 45% MARKUP</div></div>

        <div className="kpi">
          <div className="kpi-label">Total Hours</div>
          <div className="kpi-value">{totalHours.toFixed(1)}<span style={{fontSize:13, color:'var(--text-muted)'}}> hrs</span></div>

        <div className="kpi">
          <div className="kpi-label">Labour Cost</div>
          <div className="kpi-value">R {totalCost.toLocaleString('en-ZA', {maximumFractionDigits:0})}</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Labour Sell</div>
          <div className="kpi-value" style={{color:'var(--success)'}}>R {totalSell.toLocaleString('en-ZA', {maximumFractionDigits:0})}</div>
          <div className="kpi-delta delta-up">GP 31.0% @ 45% markup</div>
        </div>
      </div>

      <div className="card">
        <div className="card-head"><div className="card-title">Labour Breakdown</div></div>
        <table className="data">
          <thead><tr><th>Category</th><th>Skill</th><th className="t-right">Hours</th><th className="t-right">Rate (R/hr)</th><th className="t-right">Cost</th><th className="t-right">Sell @ 45%</th></tr></thead>
          <tbody>
            {labour.map(l => (
              <tr key={l.id}>
                <td>{l.cat}</td>

            <tr style={{background:'var(--surface-2)', fontWeight:600}}>
              <td colSpan={2}>TOTAL</td>
              <td className="t-right t-num">{totalHours.toFixed(1)}</td>

/* ---------- Copper tab ---------- */
const CopperTab = ({ copper, setCopper }) => {
  const set = (k, v) => setCopper({ ...copper, [k]: v });

  const density = 8960; // kg/m³ (still used for displayed weight)
  const totalLength = copper.length * copper.qty;
  const volume = (copper.width/1000) * (copper.height/1000) * totalLength;
  const weight = volume * density;
  const matCost = totalLength * copper.mRate * (1 + copper.waste/100);
  const tinUplift = copper.tinned ? matCost * 0.18 : 0;
  const fabCost = copper.fabHours * copper.fabRate;
  const total = matCost + tinUplift + fabCost;
  const sell = total * (1 + copper.markup/100);

  return (
    <div className="content" style={{maxWidth:1100}}>
      <div className="page-head">
        <div><h1 className="page-title">Copper Work Calculator</h1>
        <div className="page-sub">BUSBAR FABRICATION · LIVE PRICE PER M · WASTE FACTOR APPLIED</div></div>
        <button className="btn btn-sm"><Icon name="plus" size={12}/>Add busbar run</button>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:14}}>
        <div className="card">
          <div className="card-head"><Icon name="copper" size={14} style={{color:'#C2410C'}}/><div className="card-title">Busbar Run · 250A Main</div></div>
          <div className="card-body">
            <div className="form-grid">
              <div className="field"><label className="label">Width</label><div className="input-group"><input className="input num" value={copper.width} onChange={e=>set('width', Number(e.target.value))}/><span className="input-suffix">mm</span></div></div>
              <div className="field"><label className="label">Thickness</label><div className="input-group"><input className="input num" value={copper.height} onChange={e=>set('height', Number(e.target.value))}/><span className="input-suffix">mm</span></div></div>
              <div className="field"><label className="label">Length</label><div className="input-group"><input className="input num" value={copper.length} onChange={e=>set('length', Number(e.target.value))}/><span className="input-suffix">m</span></div></div>
              <div className="field"><label className="label">Quantity</label><div className="input-group"><input className="input num" value={copper.qty} onChange={e=>set('qty', Number(e.target.value))}/><span className="input-suffix">bars</span></div></div>

              <div className="field"><label className="label">Cu price / m</label><div className="input-group"><input className="input num" value={copper.mRate} onChange={e=>set('mRate', Number(e.target.value))}/><span className="input-suffix">ZAR</span></div></div>
              <div className="field"><label className="label">Waste %</label><div className="input-group"><input className="input num" value={copper.waste} onChange={e=>set('waste', Number(e.target.value))}/><span className="input-suffix">%</span></div></div>
              <div className="field"><label className="label">Fab. hours</label><div className="input-group"><input className="input num" value={copper.fabHours} onChange={e=>set('fabHours', Number(e.target.value))}/><span className="input-suffix">hrs</span></div></div>
              <div className="field"><label className="label">Fab. rate</label><div className="input-group"><input className="input num" value={copper.fabRate} onChange={e=>set('fabRate', Number(e.target.value))}/><span className="input-suffix">R/h</span></div></div>

              <div className="field col-span-2" style={{flexDirection:'row', alignItems:'center', gap:10}}>
                <input type="checkbox" id="tin" checked={copper.tinned} onChange={e=>set('tinned', e.target.checked)} style={{accentColor:'var(--primary)'}}/>

  <script type="text/babel">
/* Main app shell */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "vatRate": 15,
  "marginTarget": 25,
  "accent": "blue"
}/*EDITMODE-END*/;

const ACCENT_MAP = {
  blue:   { dark: '#3B82F6', darkHover: '#2563EB', light: '#2563EB', lightHover: '#1D4ED8' },
  amber:  { dark: '#F59E0B', darkHover: '#D97706', light: '#D97706', lightHover: '#B45309' },
  green:  { dark: '#22C55E', darkHover: '#16A34A', light: '#16A34A', lightHover: '#15803D' },
  copper: { dark: '#EA580C', darkHover: '#C2410C', light: '#C2410C', lightHover: '#9A3412' },
};

const App = () => {
  const [view, setView] = React.useState('login'); // login | dashboard | quote | pdf
  const [project, setProject] = React.useState(window.PPE.CURRENT_PROJECT);
  const [bom, setBom] = React.useState(window.PPE.INITIAL_BOM);
  const [labour, setLabour] = React.useState(window.PPE.INITIAL_LABOUR);
  const [copper, setCopper] = React.useState({
    width: 40, height: 10, length: 1.4, qty: 3, mRate: 358, waste: 12,
    fabHours: 6.5, fabRate: 520, tinned: true, markup: 35,
  });

  const t = useTweaks(TWEAK_DEFAULTS);
  const tweak = t[0]; const setTweak = t[1];

  // apply theme + accent to root
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweak.theme);
    const a = ACCENT_MAP[tweak.accent] || ACCENT_MAP.blue;
    const isDark = tweak.theme === 'dark';
    document.documentElement.style.setProperty('--primary', isDark ? a.dark : a.light);
    document.documentElement.style.setProperty('--primary-hover', isDark ? a.darkHover : a.lightHover);
  }, [tweak.theme, tweak.accent]);

  // --- totals (live) ---
  const totals = React.useMemo(() => {
    const matCost = bom.reduce((s, b) => s + b.qty * b.cost, 0);
    const matSell = bom.reduce((s, b) => s + b.qty * b.cost * (1 + b.markup/100), 0);
    const labCost = labour.reduce((s, l) => s + l.hours * l.rate, 0);
    const labSell = labCost * 1.45;
    const cuTotalLength = copper.length * copper.qty;
    const cuVolume = (copper.width/1000) * (copper.height/1000) * cuTotalLength;
    const cuWeight = cuVolume * 8960;
    const cuMat = cuTotalLength * copper.mRate * (1 + copper.waste/100);
    const cuTin = copper.tinned ? cuMat * 0.18 : 0;
    const cuFab = copper.fabHours * copper.fabRate;
    const copperCost = cuMat + cuTin + cuFab;
    const copperSell = copperCost * (1 + copper.markup/100);
    const consumables = (matCost + labCost) * 0.03;
    const totalCost = matCost + labCost + copperCost + consumables;
    const subtotal = matSell + labSell + copperSell + consumables*1.2;
    const gpAmount = subtotal - totalCost;
    const gp = subtotal > 0 ? (gpAmount/subtotal) * 100 : 0;
    const vat = subtotal * (tweak.vatRate/100);
    const grand = subtotal + vat;
    return { matCost, matSell, labCost, labSell, copperCost, copperSell, consumables, totalCost, subtotal, gpAmount, gp, vat, grand };
  }, [bom, labour, copper, tweak.vatRate]);

  if (view === 'login') {
    return (
      <>
        <LoginScreen onLogin={() => setView('dashboard')}/>
        <TweaksPanelHost tweak={tweak} setTweak={setTweak}/>
      </>
    );
  }

  if (view === 'pdf') {
    return (
      <>
        <PdfPreview project={project} bom={bom} labour={labour} totals={totals}
          onBack={() => setView('quote')}/>
        <TweaksPanelHost tweak={tweak} setTweak={setTweak}/>
      </>
    );
  }

  return (
    <div className="app">
      <Sidebar view={view} setView={setView}/>
      <div className="main">
        <Topbar view={view} project={project} setView={setView} totals={totals} tweak={tweak} setTweak={setTweak}/>
        {view === 'dashboard' && (
          <Dashboard
            onOpenQuote={() => setView('quote')}
            onNewQuote={() => setView('quote')}
          />
        )}
        {view === 'quote' && (
          <QuoteBuilder
            project={project} bom={bom} setBom={setBom}
            labour={labour} setLabour={setLabour}
            copper={copper} setCopper={setCopper}
            totals={totals}
            onPDF={() => setView('pdf')}
            onBack={() => setView('dashboard')}
          />
        )}
      </div>
      <TweaksPanelHost tweak={tweak} setTweak={setTweak}/>
    </div>
  );
};

  const items = [

const Topbar = ({ view, project, setView, totals, tweak, setTweak }) => {
  const crumbs = {
    dashboard: [['Workspace'], ['Dashboard']],
    quote:     [['Workspace'], ['Quotes'], [project.num + ' · ' + project.customer]],
  }[view] || [['Workspace']];

  return (
    <div className="topbar">
      <div className="crumbs">
        {crumbs.map((c, i) => (
          <React.Fragment key={i}>
            {i > 0 && <span className="crumb-sep">/</span>}
            <span className={i === crumbs.length-1 ? 'crumb-current' : ''}>{c}</span>
          </React.Fragment>
        ))}
      </div>
      {view === 'quote' && (
        <>
          <div style={{width:1, height:24, background:'var(--border)'}}/>
          <div style={{display:'flex', alignItems:'center', gap:18, fontFamily:'IBM Plex Mono, monospace', fontSize:11.5}}>
            <span style={{color:'var(--text-muted)'}}>SELL <b style={{color:'var(--text)'}}>R {totals.subtotal.toLocaleString('en-ZA', {maximumFractionDigits:0})}</b></span>
            <span style={{color:'var(--text-muted)'}}>GP <b style={{color: totals.gp<25?'var(--warning)':'var(--success)'}}>{totals.gp.toFixed(1)}%</b></span>
            <span style={{color:'var(--text-muted)'}}>LINES <b style={{color:'var(--text)'}}>{window.PPE.INITIAL_BOM.length}</b></span>
          </div>
        </>
      )}
      <div className="topbar-actions">
        <div className="search" style={{width:240}}>
          <Icon name="search" size={13} className="search-icon"/>
          <input className="input" placeholder="Search items, quotes, clients…"/>
        </div>
        <span className="kbd">⌘K</span>
        <div className="theme-toggle">
          <button className={tweak.theme==='light'?'active':''} onClick={()=>setTweak('theme','light')} title="Light mode">
            <Icon name="sun" size={13}/>
          </button>
          <button className={tweak.theme==='dark'?'active':''} onClick={()=>setTweak('theme','dark')} title="Dark mode">
            <Icon name="moon" size={13}/>
          </button>
        </div>
      </div>
    </div>
  );
};

/* ---------- Tweaks ---------- */
const TweaksPanelHost = ({ tweak, setTweak }) => (
  <TweaksPanel title="Tweaks">
    <TweakSection label="Appearance">
      <TweakRadio label="Theme" value={tweak.theme}
        options={[{value:'dark',label:'Dark'},{value:'light',label:'Light'}]}
        onChange={v=>setTweak('theme', v)}/>
      <TweakRadio label="Accent" value={tweak.accent}
        options={[{value:'blue',label:'Blue'},{value:'amber',label:'Amber'},{value:'green',label:'Green'},{value:'copper',label:'Copper'}]}
        onChange={v=>setTweak('accent', v)}/>
    </TweakSection>
    <TweakSection label="Calculation">
      <TweakSlider label="VAT rate" value={tweak.vatRate} min={0} max={25} step={0.5} unit="%"
        onChange={v=>setTweak('vatRate', v)}/>
      <TweakSlider label="Margin target" value={tweak.marginTarget} min={10} max={50} step={1} unit="%"
        onChange={v=>setTweak('marginTarget', v)}/>
    </TweakSection>
  </TweaksPanel>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  </script>

</body>
</html>
